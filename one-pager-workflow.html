<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uncia Credit Eligibility BRE - One Page Workflow</title>
  <style>
    :root {
      --page: #eaf2f6;
      --ink: #071b4d;
      --muted: #52606d;
      --line: #cfe3eb;
      --brand: #17677c;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 18px;
    }

    .shell {
      width: min(100%, 1800px);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 14px;
    }

    .title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    .action {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--brand);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .sheet {
      width: 100%;
      aspect-ratio: 26 / 15;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
      box-shadow: 0 20px 55px rgba(7, 27, 77, 0.14);
    }

    .sheet img {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 0;
      }

      body {
        padding: 0;
        background: #ffffff;
      }

      .topbar {
        display: none;
      }

      .shell,
      .sheet {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title">
        <h1>Uncia Credit Eligibility BRE - One Page Workflow</h1>
        <div class="subtitle">Deal/application workflow with key Uncia UI changes and Forward guardrails.</div>
      </div>
      <nav class="actions" aria-label="Page links">
        <a class="action" href="./">Open Prototype</a>
        <a class="action" href="./links.html">All Links</a>
        <a class="action" href="./credit_eligibility_bre_cpo_one_page_v2.svg">Open SVG</a>
      </nav>
    </header>
    <section class="sheet" aria-label="Credit Eligibility BRE one page workflow">
      <img src="credit_eligibility_bre_cpo_one_page_v2.svg" alt="Credit Eligibility BRE workflow, UI changes, and Forward controls">
    </section>
  </main>
</body>
</html>
